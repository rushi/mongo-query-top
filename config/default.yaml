# MongoDB Server Configurations
# Each key represents a server ID that can be used with -c flag
servers:
  localhost:
    name: Local MongoDB
    uri: mongodb://localhost:27017

api:
  port: 9001
  host: 0.0.0.0
  logLevel: info
  apiKey: dev-key-change-in-production
  cors:
    origins:
      - http://localhost:9000 # Vite dev server (preferred)
      - http://localhost:9173 # Vite preview server
    credentials: true

frontend:
  url: http://localhost:9000
